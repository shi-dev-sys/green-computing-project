<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #eef2ff, #f0fdf4);
            color: #1f2937;
        }
        #loginBox {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card, .card {
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
        }
        .login-card {
            padding: 40px;
            width: 340px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: #fff;
        }
        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #f8fafc;
            padding: 25px;
            border-right: 1px solid #e5e7eb;
        }
        .sidebar h2 { color: #16a34a; }
        .main {
            margin-left: 270px;
            padding: 25px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
        }
        .subinfo {
            font-size: 14px;
            color: #16a34a;
            margin-top: 6px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }
        .card {
            padding: 18px;
            transition: .3s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 10px;
        }
        .value {
            font-size: 18px;
            font-weight: 600;
        }
        .device-title {
            font-size: 18px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
        }
        .normal { background: #e8f5e9; color: #166534; }
        .high { background: #fdeaea; color: #991b1b; }
        canvas {
            background: #ffffff;
            border-radius: 16px;
            padding: 10px;
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <h2 style="color:#16a34a;">🔐 Admin Login</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>
</div>

<div class="sidebar" id="sidebar" style="display:none;">
    <h2>Green Computing Lab Energy & Carbon Emission Analyser</h2>
</div>

<div class="main" id="dashboard" style="display:none;">
    <div class="topbar">
        <div>
            <div class="title">Green Computing Dashboard</div>
            <div class="subinfo" id="lastUpdated">Last Updated: --</div>
        </div>
        <button onclick="logout()">Logout</button>
    </div>

    <div style="margin-top:20px;">
        <input id="alertEmail" placeholder="Enter alert email">
        <button onclick="saveEmail()">Save Alert Email</button>
        <input id="searchBox" placeholder="Search Device" onkeyup="fetchData()">
    </div>

    <div class="grid">
        <div class="card"><div class="label">Total Systems</div><div class="value" id="totalSystems">0</div></div>
        <div class="card"><div class="label">High Usage Systems</div><div class="value" id="highSystems">0</div></div>
        <div class="card"><div class="label">Total Energy</div><div class="value" id="totalEnergy">0</div></div>
        <div class="card"><div class="label">Total CO₂</div><div class="value" id="totalCarbon">0</div></div>
    </div>

    <div class="grid" id="deviceGrid"></div>

    <div style="height:400px;">
        <canvas id="energyChart"></canvas>
    </div>
</div>

<script>
async function login(){
    const res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});
    const data = await res.json();
    if(data.status==='success'){
        loginBox.style.display='none';
        dashboard.style.display='block';
        sidebar.style.display='block';
        fetchData();
        loadGraph();
        setInterval(fetchData,3000);
    } else loginMsg.innerText='Invalid Login';
}

async function logout(){await fetch('/logout');location.reload();}

async function saveEmail(){
    await fetch('/set_email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:alertEmail.value})});
    alert('Saved');
}

async function fetchData(){
    const res=await fetch('/live');
    const data=await res.json();
    const grid=document.getElementById('deviceGrid');
    const search=searchBox.value.toLowerCase();
    grid.innerHTML='';

    let high=0,totalE=0,totalC=0;

    data.devices.forEach((d,i)=>{
        if(search && !d.device.toLowerCase().includes(search)) return;
        if(d.power_watts>70||d.energy_kwh>0.1) high++;
        totalE+=d.energy_kwh*1000;
        totalC+=d.co2_kg*1000;

        const id='c'+i;

        const card=document.createElement('div');
        card.className='card';

        const cpuId='cpu_'+id;
        const powerId='power_'+id;
        const energyId='energy_'+id;
        const co2Id='co2_'+id;

        card.innerHTML = `
        <div class="device-title">${d.device}</div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
            <div>
                <div class="label">⚡ CPU Usage</div>
                <div class="value">${d.cpu_usage.toFixed(2)}%</div>
            </div>
            <canvas id="${cpuId}" style="width:90px; height:45px;"></canvas>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
            <div>
                <div class="label">🔌 Power</div>
                <div class="value">${d.power_watts.toFixed(2)} W</div>
            </div>
            <canvas id="${powerId}" style="width:90px; height:45px;"></canvas>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
            <div>
                <div class="label">🌱 Energy</div>
                <div class="value">${(d.energy_kwh*1000).toFixed(2)} mWh</div>
            </div>
            <canvas id="${energyId}" style="width:90px; height:45px;"></canvas>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
            <div>
                <div class="label">🌍 CO₂</div>
                <div class="value">${(d.co2_kg*1000).toFixed(2)} g</div>
            </div>
            <canvas id="${co2Id}" style="width:90px; height:45px;"></canvas>
        </div>

        <div class="badge ${d.power_watts>70?'high':'normal'}">${d.power_watts>70?'🔴 High Usage':'🟢 Normal'}</div>
        `;

        grid.appendChild(card);

        function miniChart(id,val){
            const ctx=document.getElementById(id).getContext('2d');
            new Chart(ctx,{type:'bar',data:{labels:[''],datasets:[{data:[val],backgroundColor:'#22c55e',barThickness:10}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:true}},scales:{x:{display:false},y:{beginAtZero:true,display:false}}}});
        }

        miniChart(cpuId,d.cpu_usage);
        miniChart(powerId,Math.min(d.power_watts,100));
        miniChart(energyId,Math.min(d.energy_kwh*1000,100));
        miniChart(co2Id,Math.min(d.co2_kg*1000,100));

        grid.appendChild(card);

        const ctx=document.getElementById(id).getContext('2d');
        new Chart(ctx,{type:'bar',data:{labels:['⚡ CPU','🔌 Power','🌱 Energy','🌍 CO₂'],datasets:[{data:[d.cpu_usage,Math.min(d.power_watts,100),Math.min(d.energy_kwh*1000,100),Math.min(d.co2_kg*1000,100)],backgroundColor:['#22c55e','#3b82f6','#f59e0b','#ef4444'],borderRadius:8,barThickness:12}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:true,backgroundColor:'#111827',titleColor:'#fff',bodyColor:'#fff',padding:10,displayColors:false}},animation:{duration:900,easing:'easeOutQuart'},scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'#e5e7eb'}}}}});
    });

    totalSystems.innerText=data.devices.length;
    highSystems.innerText=high;
    totalEnergy.innerText=totalE.toFixed(2)+' mWh';
    totalCarbon.innerText=totalC.toFixed(2)+' g';
    lastUpdated.innerText='Last Updated: '+new Date().toLocaleTimeString();
}

async function loadGraph(){
    const res=await fetch('/graph');
    const data=await res.json();
    const ctx=energyChart.getContext('2d');
    if(window.g) window.g.destroy();
    const ds=[];
    for(const d in data.devices) ds.push({label:d,data:data.devices[d],borderWidth:2});
    window.g=new Chart(ctx,{type:'line',data:{labels:data.labels,datasets:ds},options:{responsive:true}});
}
</script>
</body>
</html>
