<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        #loginBox {
            text-align: center;
            margin-top: 120px;
        }

        input {
            padding: 12px;
            width: 250px;
            border-radius: 10px;
            border: none;
            margin: 5px;
        }

        button {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: #00c853;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #009624;
        }

        #dashboard {
            display: none;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .value {
            font-size: 22px;
            margin-top: 10px;
            font-weight: bold;
        }

        .sleep-active {
            border-left: 6px solid #00e676;
        }

        .sleep-idle {
            border-left: 6px solid #ff1744;
        }

        canvas {
            margin-top: 30px;
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>🔐 Admin Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="loginMsg" style="color:red;"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <div class="top-bar">
        <h1>🌱 Green Computing Dashboard</h1>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- EMAIL INPUT -->
    <div class="card">
        <h3>Set Alert Email</h3>
        <input id="emailInput" placeholder="Enter email">
        <button onclick="saveEmail()">Save</button>
        <p id="emailMsg"></p>
    </div>

    <div class="container">

        <div class="card">
            <h3>Device</h3>
            <div class="value" id="device">--</div>
        </div>

        <div class="card">
            <h3>CPU Usage</h3>
            <div class="value" id="cpu">0</div>
        </div>

        <div class="card">
            <h3>Power (W)</h3>
            <div class="value" id="power">0</div>
        </div>

        <div class="card">
            <h3>Energy (kWh)</h3>
            <div class="value" id="energy">0</div>
        </div>

        <div class="card">
            <h3>CO₂ (kg)</h3>
            <div class="value" id="co2">0</div>
        </div>

        <!-- SLEEP -->
        <div class="card" id="sleepCard">
            <h3>Sleep Status</h3>
            <div class="value" id="sleep">--</div>
        </div>

        <!-- ALERT -->
        <div class="card" id="alertCard">
            <h3>Energy Alert</h3>
            <div class="value" id="alert">--</div>
        </div>

    </div>

    <canvas id="energyChart" height="100"></canvas>

</div>

<script>

let chart;

// LOGIN
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.status === "success") {
        showDashboard();
    } else {
        document.getElementById("loginMsg").innerText = "Invalid credentials";
    }
}

function showDashboard() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    fetchData();
    loadGraph();

    setInterval(fetchData, 3000);
}

// LOGOUT
async function logout() {
    await fetch("/logout");
    location.reload();
}

// AUTO LOGIN
window.onload = async function () {
    const res = await fetch("/check_login");
    const data = await res.json();

    if (data.logged_in) {
        showDashboard();
    }
};

// EMAIL SAVE
async function saveEmail() {
    const email = document.getElementById("emailInput").value;

    const res = await fetch("/set_email", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email })
    });

    const data = await res.json();

    if (data.status === "saved") {
        document.getElementById("emailMsg").innerText = "✅ Email saved!";
    }
}

// ANIMATION
function animateValue(id, start, end, duration) {
    let range = end - start;
    let current = start;
    let increment = range / (duration / 50);

    let timer = setInterval(() => {
        current += increment;
        document.getElementById(id).innerText = current.toFixed(2);

        if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
            document.getElementById(id).innerText = end.toFixed(2);
            clearInterval(timer);
        }
    }, 50);
}

// FETCH DATA
async function fetchData() {
    const response = await fetch("/live");
    const data = await response.json();

    document.getElementById("device").innerText = data.device;

    animateValue("cpu", 0, data.cpu_usage, 300);
    animateValue("power", 0, data.power_watts, 300);
    animateValue("energy", 0, data.energy_kwh, 300);
    animateValue("co2", 0, data.co2_kg, 300);

    // Sleep UI
    const sleepText = document.getElementById("sleep");
    const sleepCard = document.getElementById("sleepCard");

    if (data.sleep) {
        sleepText.innerText = "💤 Triggered";
        sleepCard.classList.add("sleep-idle");
        sleepCard.classList.remove("sleep-active");
    } else {
        sleepText.innerText = "🟢 Active";
        sleepCard.classList.add("sleep-active");
        sleepCard.classList.remove("sleep-idle");
    }

    // Alert UI
    const alertText = document.getElementById("alert");
    const alertCard = document.getElementById("alertCard");

    if (data.alert) {
        alertText.innerText = "⚠️ High Usage";
        alertCard.classList.add("sleep-idle");
    } else {
        alertText.innerText = "✅ Normal";
        alertCard.classList.remove("sleep-idle");
    }
}

// GRAPH
async function loadGraph() {
    const res = await fetch("/graph");
    const data = await res.json();

    const ctx = document.getElementById("energyChart").getContext("2d");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "CPU Usage",
                data: data.values,
                borderWidth: 2
            }]
        }
    });
}

</script>

</body>
</html>
