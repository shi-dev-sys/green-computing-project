<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ================= STYLE ================= -->
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        #dashboard {
            margin-top: 20px;
            animation: fadeIn 1s ease-in;
        }

        /* CARD STYLE */
        .card {
            background: white;
            padding: 15px;
            margin: 10px auto;
            width: 300px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0px 6px 18px rgba(0,0,0,0.2);
        }

        canvas {
            background: white;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        #loginBox {
            margin-top: 100px;
            animation: fadeIn 1s ease-in;
        }

        input {
            padding: 10px;
            width: 220px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #1b5e20;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
    <h2>Admin Login</h2>

    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>

    <p id="loginMsg" style="color:red;"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" style="display:none;">

    <h1>Green Computing Dashboard</h1>

    <!-- CARDS -->
    <div class="card">Device: <span id="device">-</span></div>
    <div class="card">CPU Usage: <span id="cpu">0</span> %</div>
    <div class="card">Power: <span id="power">0</span> W</div>
    <div class="card">Energy: <span id="energy">0</span> kWh</div>
    <div class="card">CO₂: <span id="co2">0</span> kg</div>

    <br>

    <button onclick="logout()">Logout</button>

    <br><br>

    <!-- GRAPH -->
    <canvas id="energyChart" width="600" height="300"></canvas>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

let chart;

// ---------------- LOGIN ----------------
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.status === "success") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        fetchData();
        loadGraph();
    } else {
        document.getElementById("loginMsg").innerText = "Invalid credentials";
    }
}

// ---------------- LOGOUT ----------------
async function logout() {
    await fetch("/logout");
    location.reload();
}

// ---------------- AUTO LOGIN CHECK ----------------
window.onload = async function () {
    const res = await fetch("/check_login");
    const data = await res.json();

    if (data.logged_in) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        fetchData();
        loadGraph();
    }
};

// ---------------- ANIMATION FUNCTION ----------------
function animateValue(id, start, end, duration) {
    let range = end - start;
    let current = start;
    let increment = range / (duration / 50);

    let timer = setInterval(() => {
        current += increment;
        document.getElementById(id).innerText = current.toFixed(2);

        if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
            document.getElementById(id).innerText = end;
            clearInterval(timer);
        }
    }, 50);
}

// ---------------- FETCH DATA ----------------
async function fetchData() {
    const response = await fetch("/live");
    const data = await response.json();

    document.getElementById("device").innerText = data.device;

    animateValue("cpu", 0, data.cpu_usage, 300);
    animateValue("power", 0, data.power_watts, 300);
    animateValue("energy", 0, data.energy_kwh, 300);
    animateValue("co2", 0, data.co2_kg, 300);
}

// refresh every 2 seconds
setInterval(fetchData, 2000);


// ---------------- GRAPH ----------------
async function loadGraph() {
    const res = await fetch("/graph");
    const data = await res.json();

    const ctx = document.getElementById("energyChart").getContext("2d");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "Energy (kWh)",
                data: data.values,
                borderWidth: 2
            }]
        }
    });
}

</script>

</body>
</html>
