<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #0b1220;
            color: #e5e7eb;
            overflow-x: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #0f172a;
            padding: 20px;
            animation: slideInLeft 0.6s ease;
        }

        .sidebar h2 {
            color: #22c55e;
        }

        .sidebar p {
            color: #94a3b8;
            font-size: 13px;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 240px;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 0.6s ease;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(34,197,94,0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(34,197,94,0.6);
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        /* ===== CARD (ANIMATED) ===== */
        .card {
            background: rgba(17,24,39,0.9);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #1f2937;
            transition: all 0.4s ease;
            transform: translateY(20px);
            opacity: 0;
            animation: popUp 0.6s forwards;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: #22c55e;
            box-shadow: 0 10px 30px rgba(34,197,94,0.15);
        }

        .label {
            color: #94a3b8;
            font-size: 13px;
        }

        .value {
            font-size: 24px;
            margin-top: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        /* ===== STATUS COLORS ===== */
        .good { color: #22c55e; }
        .bad { color: #ef4444; }

        /* ===== LOGIN ===== */
        #loginBox {
            text-align: center;
            margin-top: 120px;
            animation: fadeIn 1s ease;
        }

        input {
            padding: 12px;
            width: 240px;
            margin: 6px;
            border-radius: 10px;
            border: none;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 10px rgba(34,197,94,0.4);
        }

        /* ===== CHART ===== */
        canvas {
            margin-top: 25px;
            background: #0f172a;
            padding: 10px;
            border-radius: 14px;
            animation: fadeIn 1.2s ease;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideInLeft {
            from {transform: translateX(-100%);}
            to {transform: translateX(0);}
        }

        @keyframes slideDown {
            from {transform: translateY(-30px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }

        @keyframes popUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* stagger animation delay */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }
        .card:nth-child(7) { animation-delay: 0.7s; }

    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>🔐 Admin Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none;">
    <h2>⚡ Green Compute</h2>
    <p>Real-Time Energy AI System</p>
</div>

<!-- MAIN -->
<div class="main" id="dashboard" style="display:none;">

    <div class="topbar">
        <div class="title">🌱 Energy Intelligence Dashboard</div>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- GRID -->
    <div class="grid">

        <div class="card">
            <div class="label">Device</div>
            <div class="value" id="device">--</div>
        </div>

        <div class="card">
            <div class="label">CPU Usage</div>
            <div class="value" id="cpu">0%</div>
        </div>

        <div class="card">
            <div class="label">Power</div>
            <div class="value" id="power">0 W</div>
        </div>

        <div class="card">
            <div class="label">Energy</div>
            <div class="value" id="energy">0 mWh</div>
        </div>

        <div class="card">
            <div class="label">CO₂</div>
            <div class="value" id="co2">0 g</div>
        </div>

        <div class="card">
            <div class="label">Sleep Status</div>
            <div class="value" id="sleep">--</div>
        </div>

        <div class="card">
            <div class="label">Alert Status</div>
            <div class="value" id="alert">--</div>
        </div>

    </div>

    <canvas id="energyChart"></canvas>

</div>

<script>

let chart;

// LOGIN
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.status === "success") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("sidebar").style.display = "block";

        fetchData();
        loadGraph();
        setInterval(fetchData, 2500);
    }
}

// FETCH DATA (smooth updates)
async function fetchData() {
    const res = await fetch("/live");
    const data = await res.json();

    document.getElementById("device").innerText = data.device;

    smooth("cpu", data.cpu_usage.toFixed(2) + "%");
    smooth("power", data.power_watts.toFixed(2) + " W");

    document.getElementById("energy").innerText =
        (data.energy_kwh * 1000).toFixed(3) + " mWh";

    document.getElementById("co2").innerText =
        (data.co2_kg * 1000).toFixed(3) + " g";

    document.getElementById("sleep").innerText =
        data.sleep ? "🔴 Idle" : "🟢 Active";

    document.getElementById("alert").innerText =
        data.alert ? "⚠ High Usage" : "✅ Normal";
}

// smooth value animation
function smooth(id, value) {
    const el = document.getElementById(id);
    el.style.opacity = 0;
    setTimeout(() => {
        el.innerText = value;
        el.style.opacity = 1;
    }, 150);
}

// GRAPH
async function loadGraph() {
    const res = await fetch("/graph");
    const data = await res.json();

    const ctx = document.getElementById("energyChart");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "CPU Usage",
                data: data.values,
                borderWidth: 2
            }]
        }
    });
}

</script>

</body>
</html>
