<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: radial-gradient(circle at top, #0b1220, #020617);
            color: #e5e7eb;
            overflow-x: hidden;
        }

        /* ===== LOGIN (PREMIUM GLASS CARD) ===== */
        #loginBox {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(34,197,94,0.15);
            text-align: center;
            width: 320px;
            animation: floatIn 0.8s ease;
        }

        .login-card h2 {
            color: #22c55e;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 15px rgba(34,197,94,0.6);
            transform: scale(1.02);
        }

        /* ===== BUTTON ===== */
        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            box-shadow: 0 0 25px rgba(34,197,94,0.6);
            transform: scale(1.05);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar h2 {
            color: #22c55e;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 260px;
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 25px;
        }

        /* ===== CARD + NEON EFFECT ===== */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.35s;
            position: relative;
            overflow: hidden;
        }

        /* NEON HOVER EFFECT */
        .card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow:
                0 0 10px #22c55e,
                0 0 25px #22c55e,
                0 0 40px rgba(34,197,94,0.6);
            border-color: #22c55e;
        }

        /* LIGHT SWEEP EFFECT */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(34,197,94,0.2), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }

        .label {
            color: #9ca3af;
            font-size: 13px;
        }

        .value {
            font-size: 26px;
            font-weight: 600;
            margin-top: 8px;
        }

        /* ALERT */
        .alert-high {
            border-left: 5px solid #ef4444;
            box-shadow: 0 0 25px rgba(239,68,68,0.6);
        }

        canvas {
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
        }

        /* LOGIN ANIMATION */
        @keyframes floatIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none;">
    <h2>⚡ Green Compute</h2>
</div>

<!-- MAIN -->
<div class="main" id="dashboard" style="display:none;">

    <div class="topbar">
        <div class="title">🌱 Energy Intelligence</div>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="grid">
        <div class="card"><div class="label">Device</div><div class="value" id="device">--</div></div>
        <div class="card"><div class="label">CPU</div><div class="value" id="cpu">0%</div></div>
        <div class="card"><div class="label">Power</div><div class="value" id="power">0 W</div></div>
        <div class="card"><div class="label">Energy</div><div class="value" id="energy">0</div></div>
        <div class="card"><div class="label">CO₂</div><div class="value" id="co2">0</div></div>
        <div class="card" id="alertCard"><div class="label">Alert</div><div class="value" id="alert">--</div></div>
    </div>

    <canvas id="energyChart"></canvas>
</div>

<script>

// LOGIN
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.status === "success") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("sidebar").style.display = "block";

        fetchData();
        loadGraph();
        setInterval(fetchData, 2500);
    }
}

// LOGOUT
async function logout() {
    await fetch("/logout");
    location.reload();
}

// FETCH DATA
async function fetchData() {
    const res = await fetch("/live");
    const d = await res.json();

    document.getElementById("device").innerText = d.device;
    document.getElementById("cpu").innerText = d.cpu_usage.toFixed(2) + "%";
    document.getElementById("power").innerText = d.power_watts.toFixed(2) + " W";

    document.getElementById("energy").innerText =
        (d.energy_kwh * 1000).toFixed(3) + " mWh";

    document.getElementById("co2").innerText =
        (d.co2_kg * 1000).toFixed(3) + " g";

    document.getElementById("alert").innerText =
        d.alert ? "⚠ High Usage" : "✅ Normal";

    const alertCard = document.getElementById("alertCard");
    if (d.alert) alertCard.classList.add("alert-high");
    else alertCard.classList.remove("alert-high");
}

// GRAPH
async function loadGraph() {
    const res = await fetch("/graph");
    const data = await res.json();

    new Chart(document.getElementById("energyChart"), {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "CPU Usage",
                data: data.values,
                borderColor: "#22c55e",
                tension: 0.4
            }]
        }
    });
}

</script>

</body>
</html>
