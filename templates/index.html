<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
    <h2>Admin Login</h2>

    <input id="username" placeholder="Username"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>

    <p id="loginMsg"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" style="display:none;">

    <h1>Green Computing Dashboard</h1>

    <!-- ✅ DEVICE -->
    <h3>Device: <span id="device"></span></h3>

    <h3>CPU Usage: <span id="cpu"></span>%</h3>
    <h3>Power: <span id="power"></span> W</h3>
    <h3>Energy: <span id="energy"></span> kWh</h3>
    <h3>CO2: <span id="co2"></span> kg</h3>

    <button onclick="logout()">Logout</button>

    <!-- GRAPH -->
    <canvas id="energyChart" width="400" height="200"></canvas>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

let chart;

// ---------------- LOGIN ----------------
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.status === "success") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadGraph();
    } else {
        document.getElementById("loginMsg").innerText = "Invalid credentials";
    }
}

// ---------------- LOGOUT ----------------
async function logout() {
    await fetch("/logout");
    location.reload();
}

// ---------------- AUTO LOGIN CHECK ----------------
window.onload = async function () {
    const res = await fetch("/check_login");
    const data = await res.json();

    if (data.logged_in) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadGraph();
    }
};

// ---------------- LIVE DATA ----------------
async function fetchData() {
    const response = await fetch("/live");
    const data = await response.json();

    document.getElementById("device").innerText = data.device;
    document.getElementById("cpu").innerText = data.cpu_usage;
    document.getElementById("power").innerText = data.power_watts;
    document.getElementById("energy").innerText = data.energy_kwh;
    document.getElementById("co2").innerText = data.co2_kg;
}

// refresh every 2 seconds
setInterval(fetchData, 2000);

// initial load
fetchData();


// ---------------- GRAPH ----------------
async function loadGraph() {
    const res = await fetch("/graph");
    const data = await res.json();

    const ctx = document.getElementById("energyChart").getContext("2d");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "Energy (kWh)",
                data: data.values,
                borderWidth: 2
            }]
        }
    });
}

</script>

</body>
</html>
