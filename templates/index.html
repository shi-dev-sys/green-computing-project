<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: linear-gradient(135deg, #f8fafc, #eef2ff, #f0fdf4);
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
        }

        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* ===== PARTICLES LOGIN ===== */
        #loginBox {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        canvas#particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .login-card {
            z-index: 2;
            padding: 40px;
            width: 340px;
            text-align: center;
            background: var(--card);
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        button {
            background: linear-gradient(135deg,#22c55e,#16a34a);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* ===== LAYOUT ===== */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: var(--card);
            padding: 25px;
            border-right: 1px solid var(--border);
        }

        .main {
            margin-left: 270px;
            padding: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
            gap: 18px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
        }

        .device-title {
            font-weight: 700;
            color: #16a34a;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            display: inline-block;
        }

        .normal { background:#e8f5e9;color:#166534; }
        .high { background:#fdeaea;color:#991b1b; }

        canvas {
            background: var(--card);
            border-radius: 12px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <canvas id="particles"></canvas>

    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="loginMsg"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div class="sidebar" id="sidebar" style="display:none;">
    <h2 style="color:#16a34a;">Green Computing</h2>
</div>

<div class="main" id="dashboard" style="display:none;">

    <div style="display:flex;justify-content:space-between;">
        <h2>Dashboard</h2>
        <button onclick="toggleTheme()">🌙</button>
    </div>

    <input id="searchBox" placeholder="Search Device">

    <div class="grid" id="deviceGrid"></div>

    <canvas id="energyChart" style="height:400px;margin-top:20px;"></canvas>
</div>

<script>

/* ===== PARTICLES ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*3,
        dx: (Math.random()-0.5)*1,
        dy: (Math.random()-0.5)*1
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "rgba(34,197,94,0.6)";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}
animate();

/* ===== LOGIN ===== */
async function login(){
    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:username.value,password:password.value})
    });

    const data = await res.json();

    if(data.status==='success'){
        loginBox.style.display='none';
        dashboard.style.display='block';
        sidebar.style.display='block';

        fetchData();
        loadGraph();
        setInterval(fetchData,5000);
    } else {
        loginMsg.innerText="Wrong Login";
    }
}

/* ===== SEARCH ===== */
searchBox.addEventListener("keyup",fetchData);

/* ===== FETCH ===== */
async function fetchData(){

    const res = await fetch('/live');
    const data = await res.json();

    const grid = document.getElementById("deviceGrid");
    const search = searchBox.value.toLowerCase();

    grid.innerHTML="";

    data.devices.forEach((d,i)=>{

        if(search && !d.device.toLowerCase().includes(search)) return;

        const id="c"+i;

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <div class="device-title">${d.device}</div>

        <div>
            CPU: ${d.cpu_usage.toFixed(1)}%<br>
            Power: ${d.power_watts.toFixed(1)}W<br>
            Energy: ${(d.energy_kwh*1000).toFixed(1)}mWh<br>
            CO₂: ${(d.co2_kg*1000).toFixed(1)}g
        </div>

        <div style="width:120px;height:120px;">
            <canvas id="pie_${id}"></canvas>
        </div>

        <div class="badge ${d.power_watts>70?'high':'normal'}">
            ${d.power_watts>70?'HIGH':'NORMAL'}
        </div>
        `;

        grid.appendChild(div);

        const ctx2 = document.getElementById("pie_"+id).getContext("2d");

        new Chart(ctx2,{
            type:"doughnut",
            data:{
                labels:["CPU","Power","Energy","CO₂"],
                datasets:[{
                    data:[
                        d.cpu_usage,
                        d.power_watts,
                        d.energy_kwh*1000,
                        d.co2_kg*1000
                    ],
                    backgroundColor:["#22c55e","#3b82f6","#f59e0b","#ef4444"]
                }]
            },
            options:{
                plugins:{legend:{display:false}},
                cutout:"65%",
                animation:false
            }
        });
    });
}

/* ===== LINE GRAPH ===== */
async function loadGraph(){
    const res = await fetch('/graph');
    const data = await res.json();

    const ctx = energyChart.getContext("2d");

    if(window.g) window.g.destroy();

    let ds=[];
    for(let d in data.devices){
        ds.push({label:d,data:data.devices[d]});
    }

    window.g = new Chart(ctx,{
        type:"line",
        data:{labels:data.labels,datasets:ds}
    });
}

</script>

</body>
</html>
