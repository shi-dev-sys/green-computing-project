<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: radial-gradient(circle at top, #0b1220, #020617);
            color: #e5e7eb;
            overflow-x: hidden;
        }

        /* LOGIN */
        #loginBox {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(34,197,94,0.15);
            text-align: center;
            width: 320px;
        }

        .login-card h2 {
            color: #22c55e;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: rgba(15,23,42,0.8);
            padding: 25px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar h2 {
            color: #22c55e;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-top: 25px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(34,197,94,0.3);
        }

        .label {
            color: #9ca3af;
            font-size: 13px;
        }

        .value {
            font-size: 20px;
            font-weight: 600;
            margin-top: 8px;
        }

        .device-title {
            font-size: 18px;
            color: #22c55e;
            margin-bottom: 10px;
        }

        .alert-high {
            border-left: 5px solid #ef4444;
            box-shadow: 0 0 20px rgba(239,68,68,0.4);
        }

        .email-box {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        canvas {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="login-card">
        <h2>🔐 Admin Login</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none;">
    <h2>Green Computing Lab Energy & Carbon Emission Analyser</h2>
</div>

<!-- MAIN -->
<div class="main" id="dashboard" style="display:none;">

    <div class="topbar">
        <div class="title">Green Computing Dashboard</div>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- EMAIL ALERT SETTING -->
    <div class="email-box">
        <input id="alertEmail" placeholder="Enter alert email">
        <button onclick="saveEmail()">Save Alert Email</button>
    </div>

    <!-- MULTI DEVICE CARDS -->
    <div class="grid" id="deviceGrid"></div>

    <!-- EXISTING LINE GRAPH -->
    <div style="height:400px; margin-top:30px;">
        <canvas id="energyChart"></canvas>
    </div>

    <!-- NEW BAR GRAPH SECTION -->
    <div style="height:450px; margin-top:40px;">
        <h2 style="color:#22c55e; margin-bottom:15px;">
            Green Computing Lab Energy & Carbon Emission Analyser
        </h2>
        <canvas id="systemBarChart"></canvas>
    </div>

</div>

<script>

// LOGIN
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.status === "success") {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("sidebar").style.display = "block";

        fetchData();
        loadGraph();
        loadBarGraph();

        setInterval(() => {
            fetchData();
            loadBarGraph();
        }, 3000);
    } else {
        document.getElementById("loginMsg").innerText = "Invalid Login";
    }
}

// LOGOUT
async function logout() {
    await fetch("/logout");
    location.reload();
}

// SAVE EMAIL
async function saveEmail() {
    const email = document.getElementById("alertEmail").value;

    await fetch("/set_email", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email: email })
    });

    alert("Alert email saved successfully!");
}

// FETCH MULTI DEVICE DATA
async function fetchData() {
    const res = await fetch("/live");
    const data = await res.json();

    const grid = document.getElementById("deviceGrid");
    grid.innerHTML = "";

    data.devices.forEach(device => {
        const card = document.createElement("div");
        card.className = "card";

        if (device.power_watts > 70 || device.energy_kwh > 0.1) {
            card.classList.add("alert-high");
        }

        card.innerHTML = `
            <div class="device-title">${device.device}</div>

            <div class="label">CPU Usage</div>
            <div class="value">${device.cpu_usage.toFixed(2)}%</div>

            <div class="label">Power</div>
            <div class="value">${device.power_watts.toFixed(2)} W</div>

            <div class="label">Energy</div>
            <div class="value">${(device.energy_kwh * 1000).toFixed(3)} mWh</div>

            <div class="label">CO₂</div>
            <div class="value">${(device.co2_kg * 1000).toFixed(3)} g</div>

            <div class="label">Status</div>
            <div class="value">
                ${(device.power_watts > 70 || device.energy_kwh > 0.1)
                    ? "⚠ High Usage"
                    : "✅ Normal"}
            </div>
        `;

        grid.appendChild(card);
    });
}

// EXISTING MULTI-DEVICE LINE GRAPH
async function loadGraph() {
    const res = await fetch("/graph");
    const data = await res.json();

    const ctx = document.getElementById("energyChart").getContext("2d");

    if (window.energyChartInstance) {
        window.energyChartInstance.destroy();
    }

    const datasets = [];

    for (const device in data.devices) {
        datasets.push({
            label: device,
            data: data.devices[device],
            borderWidth: 2,
            tension: 0.4,
            fill: false
        });
    }

    window.energyChartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: data.labels,
            datasets: datasets
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

// NEW SYSTEM-WISE BAR GRAPH
async function loadBarGraph() {
    const res = await fetch("/live");
    const data = await res.json();

    const labels = [];
    const cpuData = [];
    const powerData = [];
    const energyData = [];
    const carbonData = [];

    data.devices.forEach(device => {
        labels.push(device.device);
        cpuData.push(device.cpu_usage);
        powerData.push(device.power_watts);
        energyData.push(device.energy_kwh * 1000);
        carbonData.push(device.co2_kg * 1000);
    });

    const ctx = document.getElementById("systemBarChart").getContext("2d");

    if (window.barChartInstance) {
        window.barChartInstance.destroy();
    }

    window.barChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [
                {
                    label: "CPU Usage (%)",
                    data: cpuData,
                    borderWidth: 1
                },
                {
                    label: "Power (W)",
                    data: powerData,
                    borderWidth: 1
                },
                {
                    label: "Energy (mWh)",
                    data: energyData,
                    borderWidth: 1
                },
                {
                    label: "CO₂ (g)",
                    data: carbonData,
                    borderWidth: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: "top"
                }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

</script>

</body>
</html>
