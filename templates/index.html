<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: linear-gradient(135deg, #f0fdf4, #eff6ff, #ffffff);
            color: #1f2937;
        }
        #loginBox {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card, .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
        }
        .login-card {
            padding: 40px;
            width: 340px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: #fff;
        }
        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #ffffff;
            padding: 25px;
            border-right: 1px solid #e5e7eb;
        }
        .sidebar h2 { color: #16a34a; }
        .main {
            margin-left: 270px;
            padding: 25px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
        }
        .subinfo {
            font-size: 14px;
            color: #16a34a;
            margin-top: 6px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }
        .card {
            padding: 18px;
            transition: .3s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .label {
            font-size: 13px;
            color: #6b7280;
            margin-top: 10px;
        }
        .value {
            font-size: 18px;
            font-weight: 600;
        }
        .device-title {
            font-size: 18px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
        }
        .normal { background: #dcfce7; color: #166534; }
        .high { background: #fee2e2; color: #991b1b; }
        
        canvas {
            background: white;
            border-radius: 16px;
            padding: 10px;
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>

<div id="loginBox">
    <div class="login-card">
        <h2 style="color:#16a34a;">🔐 Admin Login</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>
</div>

<div class="sidebar" id="sidebar" style="display:none;">
    <h2>Green Computing Lab Energy & Carbon Emission Analyser</h2>
</div>

<div class="main" id="dashboard" style="display:none;">
    <div class="topbar">
        <div>
            <div class="title">Green Computing Dashboard</div>
            <div class="subinfo" id="lastUpdated">Last Updated: --</div>
        </div>
        <button onclick="logout()">Logout</button>
    </div>

    <div style="margin-top:20px;">
        <input id="alertEmail" placeholder="Enter alert email">
        <button onclick="saveEmail()">Save Alert Email</button>
        <input id="searchBox" placeholder="Search Device" onkeyup="fetchData()">
    </div>

    <div class="grid">
        <div class="card"><div class="label">Total Systems</div><div class="value" id="totalSystems">0</div></div>
        <div class="card"><div class="label">High Usage Systems</div><div class="value" id="highSystems">0</div></div>
        <div class="card"><div class="label">Total Energy</div><div class="value" id="totalEnergy">0</div></div>
        <div class="card"><div class="label">Total CO₂</div><div class="value" id="totalCarbon">0</div></div>
    </div>

    <div class="grid" id="deviceGrid"></div>

    <div style="height:400px;">
        <canvas id="energyChart"></canvas>
    </div>
</div>

<script>
async function login() {
    const res = await fetch('/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    });
    const data = await res.json();
    if (data.status === 'success') {
        loginBox.style.display = 'none';
        dashboard.style.display = 'block';
        sidebar.style.display = 'block';
        fetchData();
        loadGraph();
        setInterval(fetchData, 3000);
    } else {
        loginMsg.innerText = 'Invalid Login';
    }
}

async function logout() {
    await fetch('/logout');
    location.reload();
}

async function saveEmail() {
    await fetch('/set_email', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: alertEmail.value })
    });
    alert('Alert email saved successfully!');
}

async function fetchData() {
    const res = await fetch('/live');
    const data = await res.json();
    const grid = document.getElementById('deviceGrid');
    const search = document.getElementById('searchBox').value.toLowerCase();
    grid.innerHTML = '';

    let totalEnergy = 0;
    let totalCarbon = 0;
    let highCount = 0;

    data.devices.forEach(device => {
        if (search && !device.device.toLowerCase().includes(search)) return;

        const high = device.power_watts > 70 || device.energy_kwh > 0.1;
        if (high) highCount++;
        totalEnergy += device.energy_kwh * 1000;
        totalCarbon += device.co2_kg * 1000;

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="device-title">${device.device}</div>
            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
                <div style="flex:1;">
                    <div class="label">CPU Usage</div>
                    <div class="value">${device.cpu_usage.toFixed(2)}%</div>
                </div>
                <div style="width:90px; height:12px; background:#e5e7eb; border-radius:10px; overflow:hidden;">
                    <div style="width:${Math.min(device.cpu_usage,100)}%; height:100%; background:#22c55e;"></div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
                <div style="flex:1;">
                    <div class="label">Power</div>
                    <div class="value">${device.power_watts.toFixed(2)} W</div>
                </div>
                <div style="width:90px; height:12px; background:#e5e7eb; border-radius:10px; overflow:hidden;">
                    <div style="width:${Math.min(device.power_watts,100)}%; height:100%; background:#3b82f6;"></div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
                <div style="flex:1;">
                    <div class="label">Energy</div>
                    <div class="value">${(device.energy_kwh*1000).toFixed(2)} mWh</div>
                </div>
                <div style="width:90px; height:12px; background:#e5e7eb; border-radius:10px; overflow:hidden;">
                    <div style="width:${Math.min(device.energy_kwh*1000,100)}%; height:100%; background:#f59e0b;"></div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
                <div style="flex:1;">
                    <div class="label">CO₂</div>
                    <div class="value">${(device.co2_kg*1000).toFixed(2)} g</div>
                </div>
                <div style="width:90px; height:12px; background:#e5e7eb; border-radius:10px; overflow:hidden;">
                    <div style="width:${Math.min(device.co2_kg*1000,100)}%; height:100%; background:#ef4444;"></div>
                </div>
            </div>

            <div class="badge ${high ? 'high' : 'normal'}">${high ? '🔴 High Usage' : '🟢 Normal'}</div>
        `;
        grid.appendChild(card);
    });

    totalSystems.innerText = data.devices.length;
    highSystems.innerText = highCount;
    totalEnergy.innerText = totalEnergy.toFixed(2) + ' mWh';
    totalCarbon.innerText = totalCarbon.toFixed(2) + ' g';
    lastUpdated.innerText = 'Last Updated: ' + new Date().toLocaleTimeString();

    if (highCount > 0) {
        console.log('High usage detected');
    }
}

async function loadGraph() {
    const res = await fetch('/graph');
    const data = await res.json();
    const ctx = document.getElementById('energyChart').getContext('2d');

    if (window.energyChartInstance) window.energyChartInstance.destroy();

    const datasets = [];
    for (const device in data.devices) {
        datasets.push({
            label: device,
            data: data.devices[device],
            borderWidth: 2,
            tension: 0.4,
            fill: false
        });
    }

    window.energyChartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels: data.labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { y: { beginAtZero: true } }
        }
    });
}
</script>
</body>
</html>
