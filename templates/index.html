<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: linear-gradient(135deg, #f8fafc, #eef2ff, #f0fdf4);
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
        }

        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        #loginBox {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card, .card {
            background: var(--card);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .login-card {
            padding: 40px;
            width: 340px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
        }

        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: var(--card);
            padding: 25px;
            border-right: 1px solid var(--border);
        }

        .sidebar h2 { color: #16a34a; }

        .main {
            margin-left: 270px;
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
        }

        .subinfo {
            font-size: 14px;
            color: #16a34a;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .card {
            padding: 18px;
        }

        .device-title {
            font-size: 18px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 10px;
        }

        .label {
            font-size: 13px;
            color: var(--muted);
        }

        .value {
            font-size: 18px;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
        }

        .normal { background: #e8f5e9; color: #166534; }
        .high { background: #fdeaea; color: #991b1b; }

        canvas {
            background: var(--card);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }
    </style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<div id="loginBox">
    <div class="login-card">
        <h2 style="color:#16a34a;">🔐 Admin Login</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>
</div>

<div class="sidebar" id="sidebar" style="display:none;">
    <h2>Green Computing Lab Energy & Carbon Emission Analyser</h2>
</div>

<div class="main" id="dashboard" style="display:none;">

    <div class="topbar">
        <div>
            <div class="title">Green Computing Dashboard</div>
            <div class="subinfo" id="lastUpdated">Last Updated: --</div>
        </div>

        <div>
            <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div style="margin-top:20px;">
        <input id="alertEmail" placeholder="Enter alert email">
        <button onclick="saveEmail()">Save Alert Email</button>

        <input id="searchBox" placeholder="Search Device">
    </div>

    <div class="grid">
        <div class="card"><div class="label">Total Systems</div><div class="value" id="totalSystems">0</div></div>
        <div class="card"><div class="label">High Usage Systems</div><div class="value" id="highSystems">0</div></div>
        <div class="card"><div class="label">Total Energy</div><div class="value" id="totalEnergy">0</div></div>
        <div class="card"><div class="label">Total CO₂</div><div class="value" id="totalCarbon">0</div></div>
    </div>

    <div class="grid" id="deviceGrid"></div>

    <div style="height:400px; margin-top:20px;">
        <canvas id="energyChart"></canvas>
    </div>
</div>

<script>

window.pieCharts = {};

const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");

let particles = [];

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

class Particle {
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
    }

    update(){
        this.x += this.speedX;
        this.y += this.speedY;

        if(this.x < 0) this.x = canvas.width;
        if(this.x > canvas.width) this.x = 0;
        if(this.y < 0) this.y = canvas.height;
        if(this.y > canvas.height) this.y = 0;
    }

    draw(){
        ctx.fillStyle = document.body.classList.contains("dark")
            ? "rgba(34, 197, 94, 0.85)"
            : "rgba(22, 163, 74, 0.55)";

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(Math.PI / 4);

        ctx.beginPath();

        ctx.moveTo(0, -this.size);

        ctx.bezierCurveTo(
            this.size, -this.size,
            this.size, this.size,
            0, this.size
        );

        ctx.bezierCurveTo(
            -this.size, this.size,
            -this.size, -this.size,
            0, -this.size
        );

        ctx.fill();
        ctx.restore();
    }
}

function initParticles(){
    particles = [];
    for(let i=0;i<80;i++) particles.push(new Particle());
}

function animateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{p.update();p.draw();});
    requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

/* ===== LOGIN FIXED ===== */
async function login(){
    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if(data.status==='success'){
        document.getElementById("loginBox").style.display='none';
        document.getElementById("dashboard").style.display='block';
        document.getElementById("sidebar").style.display='block';

        fetchData();
        loadGraph();
        setInterval(fetchData,8000);
    } else {
        document.getElementById("loginMsg").innerText='Invalid Login';
    }
}

async function logout(){
    await fetch('/logout');
    location.reload();
}

async function saveEmail(){
    const email = document.getElementById('alertEmail').value;

    await fetch('/set_email',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email})
    });

    alert("Email saved ✔");
}

</script>

</body>
</html>
