<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ===== THEME SYSTEM ===== */
        :root {
            --bg: linear-gradient(135deg, #f8fafc, #eef2ff, #f0fdf4);
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --border: #334155;
        }

        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        /* ===== PARTICLE BACKGROUND ===== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ===== LOGIN ===== */
        #loginBox {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card, .card {
            background: var(--card);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .login-card {
            padding: 40px;
            width: 340px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
        }

        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* ===== LAYOUT ===== */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: var(--card);
            padding: 25px;
            border-right: 1px solid var(--border);
        }

        .sidebar h2 { color: #16a34a; }

        .main {
            margin-left: 270px;
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
        }

        .subinfo {
            font-size: 14px;
            color: #16a34a;
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .card {
            padding: 18px;
            transition: 0.3s;
        }

        /* ✨ hover effect */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .device-title {
            font-size: 18px;
            font-weight: 700;
            color: #16a34a;
            margin-bottom: 10px;
        }

        .label {
            font-size: 13px;
            color: var(--muted);
        }

        .value {
            font-size: 18px;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
        }

        .normal { background: #e8f5e9; color: #166534; }
        .high { background: #fdeaea; color: #991b1b; }

        canvas {
            background: var(--card);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        /* 🌿 future effect */
        .pulse {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

    </style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<div id="loginBox">
    <div class="login-card">
        <h2 style="color:#16a34a;">🔐 Admin Login</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>
</div>

<div class="sidebar" id="sidebar" style="display:none;">
    <h2>Green Computing Lab Energy & Carbon Emission Analyser</h2>
</div>

<div class="main" id="dashboard" style="display:none;">

    <div class="topbar">
        <div>
            <div class="title">Green Computing Dashboard</div>
            <div class="subinfo" id="lastUpdated">Last Updated: --</div>
        </div>

        <div>
            <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div style="margin-top:20px;">
        <input id="alertEmail" placeholder="Enter alert email">
        <button onclick="saveEmail()">Save Alert Email</button>

        <input id="searchBox" placeholder="Search Device">
    </div>

    <!-- SUMMARY -->
    <div class="grid">
        <div class="card"><div class="label">Total Systems</div><div class="value" id="totalSystems">0</div></div>
        <div class="card"><div class="label">High Usage Systems</div><div class="value" id="highSystems">0</div></div>
        <div class="card"><div class="label">Total Energy</div><div class="value" id="totalEnergy">0</div></div>
        <div class="card"><div class="label">Total CO₂</div><div class="value" id="totalCarbon">0</div></div>
    </div>

    <!-- DEVICES -->
    <div class="grid" id="deviceGrid"></div>

    <!-- GRAPH -->
    <div style="height:400px; margin-top:20px;">
        <canvas id="energyChart"></canvas>
    </div>
</div>

<script>

/* ===== PARTICLES FIXED (NO HEART SHAPE) ===== */
const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");

let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
    }

    update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
    }

    draw() {
        ctx.fillStyle = document.body.classList.contains("dark")
            ? "rgba(34, 197, 94, 0.8)"
            : "rgba(22, 163, 74, 0.5)";

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particles = [];
    for (let i = 0; i < 80; i++) particles.push(new Particle());
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

/* ===== YOUR ORIGINAL CODE (UNCHANGED LOGIC) ===== */

function toggleTheme(){
    document.body.classList.toggle("dark");
}

async function login(){
    const res = await fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:username.value,password:password.value})
    });

    const data = await res.json();

    if(data.status==='success'){
        loginBox.style.display='none';
        dashboard.style.display='block';
        sidebar.style.display='block';

        fetchData();
        loadGraph();
        setInterval(fetchData,8000);
    } else {
        loginMsg.innerText='Invalid Login';
    }
}

async function logout(){
    await fetch('/logout');
    location.reload();
}

async function saveEmail(){
    const email = document.getElementById('alertEmail').value;

    await fetch('/set_email',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email})
    });

    alert("Email saved ✔");
}

let searchTimeout;
document.getElementById("searchBox").addEventListener("keyup",()=>{
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(fetchData,300);
});

/* ===== FULL RESTORED FETCH DATA (IMPORTANT FIX) ===== */
async function fetchData(){
    const res = await fetch('/live');
    const data = await res.json();

    const grid = document.getElementById('deviceGrid');
    grid.innerHTML = '';

    let high = 0, totalE = 0, totalC = 0;

    data.devices.forEach((d,i)=>{

        if(d.power_watts > 70 || d.energy_kwh > 0.1) high++;

        totalE += d.energy_kwh * 1000;
        totalC += d.co2_kg * 1000;

        const id = 'c'+i;

        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
        <div class="device-title">${d.device}</div>
        <div class="label">CPU</div>
        <div class="value">${d.cpu_usage.toFixed(1)}%</div>

        <div class="label">Power</div>
        <div class="value">${d.power_watts.toFixed(1)} W</div>

        <div class="label">Energy</div>
        <div class="value">${(d.energy_kwh*1000).toFixed(1)} mWh</div>

        <div class="label">CO₂</div>
        <div class="value">${(d.co2_kg*1000).toFixed(1)} g</div>

        <div class="badge ${d.power_watts>70?'high':'normal'}">
            ${d.power_watts>70?'🔴 High Usage':'🟢 Normal'}
        </div>

        <div style="width:110px;height:110px;">
            <canvas id="pie_${id}"></canvas>
        </div>
        `;

        grid.appendChild(card);

        const ctx2 = document.getElementById(`pie_${id}`).getContext('2d');

        if(window.pieCharts && window.pieCharts[id]) window.pieCharts[id].destroy();

        window.pieCharts = window.pieCharts || {};

        window.pieCharts[id] = new Chart(ctx2,{
            type:'doughnut',
            data:{
                labels:['CPU','Power','Energy','CO₂'],
                datasets:[{
                    data:[
                        d.cpu_usage,
                        Math.min(d.power_watts,100),
                        Math.min(d.energy_kwh*1000,100),
                        Math.min(d.co2_kg*1000,100)
                    ],
                    backgroundColor:['#22c55e','#3b82f6','#f59e0b','#ef4444']
                }]
            },
            options:{
                cutout:'65%',
                plugins:{legend:{display:false}},
                animation:false
            }
        });
    });

    totalSystems.innerText = data.devices.length;
    highSystems.innerText = high;
    totalEnergy.innerText = totalE.toFixed(2)+' mWh';
    totalCarbon.innerText = totalC.toFixed(2)+' g';

    lastUpdated.innerText = 'Last Updated: '+new Date().toLocaleTimeString();
}

/* ===== GRAPH FIX ONLY ===== */
async function loadGraph(){
    const res = await fetch('/graph');
    const data = await res.json();

    const ctx3 = energyChart.getContext('2d');

    if(window.g) window.g.destroy();

    const ds = Object.keys(data.devices).map(d => ({
        label: d,
        data: data.devices[d],
        borderWidth: 2
    }));

    window.g = new Chart(ctx3,{
        type:'line',
        data:{labels:data.labels,datasets:ds},
        options:{responsive:true}
    });
}

</script>

</body>
</html>
