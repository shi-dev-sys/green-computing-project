<!DOCTYPE html>
<html>
<head>
    <title>Green Computing Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: linear-gradient(-45deg, #0b1220, #0f172a, #020617);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: #e5e7eb;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(12px);
            padding: 25px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar h2 {
            color: #22c55e;
        }

        /* MAIN */
        .main {
            margin-left: 260px;
            padding: 25px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(34,197,94,0.4);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 25px;
        }

        /* GLASS CARD */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.4s;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 0 25px rgba(34,197,94,0.2);
        }

        .label {
            color: #9ca3af;
            font-size: 13px;
        }

        .value {
            font-size: 26px;
            font-weight: 600;
            margin-top: 8px;
            transition: 0.3s;
        }

        /* ALERT GLOW */
        .alert-high {
            border-left: 5px solid #ef4444;
            box-shadow: 0 0 20px rgba(239,68,68,0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {box-shadow: 0 0 5px rgba(239,68,68,0.3);}
            50% {box-shadow: 0 0 25px rgba(239,68,68,0.8);}
            100% {box-shadow: 0 0 5px rgba(239,68,68,0.3);}
        }

        /* LOGIN */
        #loginBox {
            text-align: center;
            margin-top: 120px;
        }

        input {
            padding: 12px;
            width: 240px;
            margin: 6px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px rgba(34,197,94,0.4);
        }

        canvas {
            margin-top: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
        }

    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>🔐 Admin Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="loginMsg" style="color:red;"></p>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none;">
    <h2>⚡ Green Compute</h2>
    <p>AI Energy Intelligence</p>
</div>

<!-- MAIN -->
<div class="main" id="dashboard" style="display:none;">

    <div class="topbar">
        <div class="title">🌱 Energy Intelligence</div>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="grid">
        <div class="card"><div class="label">Device</div><div class="value" id="device">--</div></div>
        <div class="card"><div class="label">CPU</div><div class="value" id="cpu">0%</div></div>
        <div class="card"><div class="label">Power</div><div class="value" id="power">0 W</div></div>
        <div class="card"><div class="label">Energy</div><div class="value" id="energy">0</div></div>
        <div class="card"><div class="label">CO₂</div><div class="value" id="co2">0</div></div>
        <div class="card"><div class="label">Sleep</div><div class="value" id="sleep">--</div></div>
        <div class="card" id="alertCard"><div class="label">Alert</div><div class="value" id="alert">--</div></div>
    </div>

    <canvas id="energyChart"></canvas>

</div>

<script>

let interval = null;

// LOGIN
async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await res.json();

    if (data.status === "success") {
        showDashboard();
    } else {
        document.getElementById("loginMsg").innerText = "Invalid login";
    }
}

// SHOW DASHBOARD
function showDashboard() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("sidebar").style.display = "block";

    fetchData();
    loadGraph();

    if (interval) clearInterval(interval);
    interval = setInterval(fetchData, 2500);
}

// LOGOUT
async function logout() {
    await fetch("/logout", { method: "GET", credentials: "include" });

    document.getElementById("dashboard").style.display = "none";
    document.getElementById("sidebar").style.display = "none";
    document.getElementById("loginBox").style.display = "block";

    if (interval) clearInterval(interval);

    setTimeout(() => location.reload(), 300);
}

// AUTO LOGIN
window.onload = async function () {
    const res = await fetch("/check_login", { credentials: "include" });
    const data = await res.json();

    if (data.logged_in) {
        showDashboard();
    }
};

// SMOOTH VALUE UPDATE
function smooth(id, value) {
    const el = document.getElementById(id);
    el.style.transform = "scale(1.1)";
    setTimeout(() => {
        el.innerText = value;
        el.style.transform = "scale(1)";
    }, 150);
}

// FETCH DATA
async function fetchData() {
    const res = await fetch("/live");
    const d = await res.json();

    smooth("device", d.device);
    smooth("cpu", d.cpu_usage.toFixed(2) + "%");
    smooth("power", d.power_watts.toFixed(2) + " W");

    document.getElementById("energy").innerText =
        (d.energy_kwh * 1000).toFixed(3) + " mWh";

    document.getElementById("co2").innerText =
        (d.co2_kg * 1000).toFixed(3) + " g";

    document.getElementById("sleep").innerText =
        d.sleep ? "🔴 Idle" : "🟢 Active";

    document.getElementById("alert").innerText =
        d.alert ? "⚠ High Usage" : "✅ Normal";

    // ALERT GLOW
    const alertCard = document.getElementById("alertCard");
    if (d.alert) {
        alertCard.classList.add("alert-high");
    } else {
        alertCard.classList.remove("alert-high");
    }
}

// GRAPH
async function loadGraph() {
    const res = await fetch("/graph");
    const data = await res.json();

    new Chart(document.getElementById("energyChart"), {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "CPU Usage",
                data: data.values,
                borderColor: "#22c55e",
                tension: 0.4
            }]
        }
    });
}

</script>

</body>
</html>
